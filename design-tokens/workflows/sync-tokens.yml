name: Sync Tokens to CSS

on:
  push:
    branches: [ main ]
    paths:
      - 'tokens.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Generate CSS
        run: node scripts/build-tokens.js
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/tokens.css
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update tokens.css"
          git push
